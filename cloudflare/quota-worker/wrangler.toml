name = "notraceaudio-quota-worker"
main = "src/index.js"
compatibility_date = "2026-05-09"

[vars]
FREE_DAILY_LIMIT = "3"
# Comma separated list, example: "https://mydomain.com,https://mydomain.pages.dev"
ALLOWED_ORIGINS = "*"

[[kv_namespaces]]
binding = "QUOTA_KV"
id = "REPLACE_WITH_PROD_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "notraceaudio-quota"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
